<!DOCTYPE html>
<html>

<head>

<title>Chaos Wall</title>

<link rel="stylesheet" href="style.css">

<script src="script.js" defer></script>

<style>

body{
margin:0;
text-align:center;
font-family:Arial, sans-serif;
}

canvas{
border:2px solid white;
background:white;
border-radius:10px;
margin-top:20px;
cursor:crosshair;
}

.tools{
margin-top:20px;
}

.tools button{
margin:5px;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.tools input{
margin:10px;
}

</style>

</head>

<body class="chaos-bg">

<h2>Chaos Wall</h2>

<p class="chaos-quote">
Your chaos doesn't need to be perfect.  
Let it exist. Let it breathe.
</p>
<canvas id="chaosCanvas" width="800" height="500"></canvas>

<div class="tools">

<p>Choose Color</p>
<input type="color" id="colorPicker">

<p>Brush Size</p>
<input type="range" id="brushSize" min="1" max="40" value="5">

<br><br>

<button onclick="setNormalBrush()">Normal</button>
<button onclick="setSparkleBrush()">✨ Sparkle</button>
<button onclick="setRainbowBrush()">🌈 Rainbow</button>
<button onclick="setGlowBrush()">🌟 Glow</button>
<button onclick="eraserTool()">Eraser</button>

<br><br>

<button onclick="clearCanvas()">Clear</button>
<button onclick="downloadCanvas()">Download</button>

</div>

</body>

</html>
