<!DOCTYPE html>
<html>

<head>

<title>Start Writing</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="write-bg">

<div class="panel">

<h2 class="write-title">Write Your Thoughts</h2>

<p class="write-sub">
This space is just for you. Write without pressure.
</p>

<textarea id="writingBox" placeholder="Write what you feel..."></textarea>

<br><br>

<label>Visibility</label>

<br>

<input type="radio" name="visibility" value="private" checked> Private

<input type="radio" name="visibility" value="public"> Public

<br><br>

<button onclick="saveWriting()">Save</button>

</div>

</body>

</html>
