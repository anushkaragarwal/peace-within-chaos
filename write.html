<!DOCTYPE html>
<html>

<head>

<title>Start Writing</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="write-bg">

<div class="panel">

<h2 class="write-title">Write Your Thoughts</h2>

<p class="write-sub">
This space is just for you. Write without pressure.
</p>

<textarea 
id="journalText" 
placeholder="This space is just for you..." 
rows="10" 
cols="50">
</textarea>

<br><br>

<label>Visibility</label>

<br>

<input type="radio" name="visibility" value="private" checked> Private

<input type="radio" name="visibility" value="public"> Public

<br><br>

<button onclick="saveJournal()">Save</button>

</div>

<script>

async function saveJournal(){

const text = document.getElementById("journalText").value;

const visibility = document.querySelector('input[name="visibility"]:checked').value;

const response = await fetch("http://localhost:3000/api/journal",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text,
visibility:visibility,
date:new Date()
})

});

const data = await response.json();

alert("Journal saved successfully!");

console.log(data);

}

</script>

</body>

</html>
